<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Convery Dashboards · Login</title>
<style>
:root {
  color-scheme: light;
  --primary: #3333FF;
  --primary-light: #191980;
  --primary-dark: #030330;
  --accent-subtle: #D6D6FF;
  --bg: #FFFFFF;
  --muted: #EEF0F4;
  --border: #D8DCE4;
  --border-light: #E8ECF2;
  --text: #1A1A2E;
  --text-secondary: #5A6178;
  --text-muted: #9098A8;
  --error: #D94452;
  --success: #2E9E5A;
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
  --r-md: 8px; --r-lg: 12px; --r-full: 9999px;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--muted); color: var(--text); min-height: 100vh; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, "Helvetica Neue", Arial, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.card {
  width: 100%;
  max-width: 380px;
  background: var(--bg);
  border-radius: var(--r-lg);
  padding: 32px;
  box-shadow: var(--shadow-lg);
}
.logo { display: flex; justify-content: center; margin-bottom: 24px; }
.logo svg { height: 24px; width: auto; }
h1 {
  font-size: 16px;
  font-weight: 700;
  color: var(--primary-dark);
  text-align: center;
  margin: 0 0 4px 0;
}
.subtitle {
  text-align: center;
  color: var(--text-muted);
  font-size: 12px;
  margin: 0 0 24px 0;
}
.form-row { margin-bottom: 14px; }
label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-secondary);
  margin-bottom: 6px;
}
input {
  appearance: none;
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 10px 12px;
  font: inherit;
  font-size: 14px;
  background: var(--bg);
  color: var(--text);
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}
input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(51, 51, 255, 0.12);
}
.btn {
  appearance: none;
  width: 100%;
  border: none;
  background: var(--primary);
  color: #fff;
  font: inherit;
  font-size: 14px;
  font-weight: 600;
  padding: 12px 16px;
  border-radius: var(--r-md);
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.15s ease;
}
.btn:hover { background: var(--primary-light); }
.btn:active { transform: translateY(1px); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }
.btn.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
.btn.btn-ghost:hover { background: var(--muted); color: var(--primary-dark); }
.error {
  display: none;
  background: #FDE6E9;
  color: #B33240;
  padding: 10px 12px;
  border-radius: var(--r-md);
  font-size: 12px;
  margin-bottom: 14px;
  border-left: 3px solid var(--error);
}
.error.visible { display: block; }
.hint {
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
  margin-top: 16px;
  line-height: 1.5;
}
.toggle-link {
  display: inline-block;
  font-size: 11px;
  color: var(--primary);
  cursor: pointer;
  text-decoration: underline;
}
.toggle-link:hover { color: var(--primary-light); }
.spinner {
  display: inline-block;
  width: 12px; height: 12px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: #fff;
  border-radius: 50%;
  margin-right: 6px;
  animation: spin 0.7s linear infinite;
  vertical-align: -1px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.client-link {
  display: block;
  padding: 12px 14px;
  margin-bottom: 8px;
  background: var(--muted);
  border-radius: var(--r-md);
  color: var(--primary-dark);
  text-decoration: none;
  font-weight: 500;
  transition: background 0.15s;
}
.client-link:hover { background: var(--accent-subtle); }
.session-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--success);
  margin-bottom: 12px;
}
.session-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
</style>
</head>
<body>
<div class="card" id="card">
  <!-- Il contenuto viene popolato da JS in base allo stato di sessione -->
</div>

<script>
const card = document.getElementById('card');
const tplLogo = document.getElementById('tplLogo').innerHTML;
const params = new URLSearchParams(location.search);
const urlSlug = (params.get('slug') || '').toLowerCase().replace(/[^a-z0-9-]/g, '');
const redirect = params.get('redirect') || '';

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function renderLogin(initialSlug, adminMode) {
  const slugRowDisplay = adminMode ? 'none' : '';
  card.innerHTML = tplLogo + `
    <h1>Dashboard Convery</h1>
    <p class="subtitle">${adminMode ? 'Modalità admin' : 'Accedi alla dashboard del tuo cliente'}</p>
    <div id="errorBox" class="error"></div>
    <form id="loginForm" autocomplete="off">
      <div class="form-row" id="slugRow" style="display:${slugRowDisplay};">
        <label for="slug">Cliente (slug)</label>
        <input id="slug" name="slug" type="text" value="${esc(initialSlug)}" autocomplete="username" placeholder="es. pirelli" pattern="[a-z0-9-]+" />
      </div>
      <div class="form-row">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required autocomplete="current-password" autofocus />
      </div>
      <button class="btn" id="submitBtn" type="submit">Accedi</button>
    </form>
    <div class="hint">
      <span class="toggle-link" id="toggleAdmin">${adminMode ? '← torna a login cliente' : 'Sei admin? accedi senza slug →'}</span>
    </div>
  `;
  document.getElementById('toggleAdmin').addEventListener('click', () => {
    renderLogin(initialSlug, !adminMode);
  });
  document.getElementById('loginForm').addEventListener('submit', handleSubmit);
}

async function handleSubmit(ev) {
  ev.preventDefault();
  const slugInput = document.getElementById('slug');
  const passwordInput = document.getElementById('password');
  const errBox = document.getElementById('errorBox');
  const btn = document.getElementById('submitBtn');
  const slug = slugInput ? (slugInput.value || '').trim().toLowerCase() : '';
  const password = passwordInput.value;
  errBox.classList.remove('visible');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Accesso…';
  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug: slug || null, password })
    });
    if (!r.ok) {
      let msg = 'Credenziali non valide';
      try { const j = await r.json(); if (j && j.error) msg = j.error; } catch {}
      errBox.textContent = msg;
      errBox.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Accedi';
      return;
    }
    const data = await r.json();
    let dest = redirect;
    if (!dest) {
      if (data.role === 'admin') {
        dest = '/'; // verrà mostrato il picker
      } else if (data.slug) {
        dest = '/d/' + data.slug;
      } else {
        dest = '/';
      }
    }
    location.href = dest;
  } catch (e) {
    errBox.textContent = 'Errore di rete: ' + (e.message || e);
    errBox.classList.add('visible');
    btn.disabled = false;
    btn.textContent = 'Accedi';
  }
}

function renderPicker(me) {
  const links = me.clients.map(c =>
    `<a class="client-link" href="/d/${esc(c.slug)}">${esc(c.name)}</a>`
  ).join('');
  card.innerHTML = tplLogo + `
    <div class="session-badge"><span class="dot"></span>Sessione attiva · ${esc(me.role)}</div>
    <h1>Le tue dashboard</h1>
    <p class="subtitle">${me.clients.length} ${me.clients.length === 1 ? 'cliente disponibile' : 'clienti disponibili'}</p>
    ${links || '<p class="hint">Nessun cliente associato al tuo account.</p>'}
    <button class="btn btn-ghost" id="logoutBtn" style="margin-top:16px;">Esci</button>
  `;
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/logout', { method: 'POST' });
    location.reload();
  });
}

async function boot() {
  try {
    const r = await fetch('/api/me');
    if (r.ok) {
      const me = await r.json();
      if (me.authenticated) {
        if (me.clients.length === 1) {
          location.href = '/d/' + me.clients[0].slug;
          return;
        }
        renderPicker(me);
        return;
      }
    }
  } catch {}
  renderLogin(urlSlug, false);
}

boot();
</script>
</body>
</html>
